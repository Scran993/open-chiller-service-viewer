<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Modbus Service Viewer</title>
    <link rel="stylesheet" href="styles.css?v=20260617-w3000-serial" />
  </head>
  <body>
    <main class="app-shell">
      <section class="toolbar" aria-label="Connection controls">
        <div class="brand">
          <h1>Modbus Service Viewer</h1>
          <p id="profileSummary">No profile loaded</p>
        </div>
        <div class="controls">
          <label>
            Profile
            <select id="profileSelect"></select>
          </label>
          <label>
            Baud
            <input id="baudRate" type="number" min="1200" step="1200" value="19200" />
          </label>
          <label>
            Serial
            <select id="serialFormat">
              <option value="8N1">8N1</option>
              <option value="8N2">8N2</option>
              <option value="8E1">8E1</option>
              <option value="8O1">8O1</option>
            </select>
          </label>
          <label>
            Slave
            <input id="slaveId" type="number" min="1" max="247" value="10" />
          </label>
          <label>
            Poll ms
            <input id="pollMs" type="number" min="250" step="250" value="1000" />
          </label>
          <label>
            Offset
            <select id="addressOffset">
              <option value="0">0</option>
              <option value="-1">-1</option>
            </select>
          </label>
          <button id="connectBtn" type="button">Connect & read</button>
          <button id="pollBtn" type="button" disabled>Start</button>
          <button id="themeToggle" type="button" class="secondary theme-button">Dark</button>
        </div>
      </section>

      <section class="status-strip" aria-label="Live connection state">
        <div><span>Port</span><strong id="portState">Disconnected</strong></div>
        <div><span>Last poll</span><strong id="lastPoll">Never</strong></div>
        <div><span>Errors</span><strong id="errorCount">0</strong></div>
        <div><span>Values</span><strong id="valueCount">0</strong></div>
        <div><span>Last error</span><strong id="lastError">None</strong></div>
      </section>

      <section class="workspace">
        <aside class="side-panel" aria-label="Profile tools">
          <div class="panel-block">
            <h2>Profiles</h2>
            <a class="button-link" href="profile-builder.html" target="_blank" rel="noreferrer">Open profile builder</a>
            <a class="button-link secondary-link" href="register-explorer.html" target="_blank" rel="noreferrer">Open register explorer</a>
            <p class="hint">Drop exported JSON files into <strong>user-profiles</strong>, then restart the viewer.</p>
          </div>

          <div class="panel-block">
            <h2>Logging</h2>
            <div class="button-row">
              <button id="logBtn" type="button">Start log</button>
              <button id="downloadLogBtn" type="button" disabled>Download CSV</button>
            </div>
            <button id="snapshotBtn" type="button" class="secondary">Snapshot</button>
            <p class="hint" id="logState">Not logging</p>
          </div>

          <div class="panel-block point-picker">
            <h2>Shown Points</h2>
            <label>Find point <input id="pointFilterInput" placeholder="pressure, temp, alarm..." /></label>
            <div class="button-row">
              <button id="showAllBtn" type="button" class="secondary">All</button>
              <button id="showNoneBtn" type="button" class="secondary">None</button>
            </div>
            <button id="showServiceBtn" type="button" class="secondary">Service view</button>
            <p class="hint" id="shownPointSummary">No points loaded</p>
            <div id="pointChecklist" class="point-checklist"></div>
          </div>
        </aside>

        <section class="values-panel" aria-label="Live values">
          <div class="table-tools">
            <label>
              Filter
              <input id="filterInput" placeholder="pressure, compressor, alarm..." />
            </label>
            <button id="readOnceBtn" type="button" disabled>Read once</button>
          </div>
          <section class="value-group key-values" aria-label="Key live values">
            <h2>Key values</h2>
            <div id="keyValues" class="key-grid"></div>
          </section>
          <div id="groups" class="groups"></div>
        </section>
      </section>
    </main>

    <template id="groupTemplate">
      <section class="value-group">
        <h2></h2>
        <div class="value-grid"></div>
      </section>
    </template>

    <template id="valueTemplate">
      <article class="value-card">
        <div>
          <h3></h3>
          <p class="meta"></p>
        </div>
        <strong class="value">--</strong>
      </article>
    </template>

    <script src="app.js?v=20260617-w3000-serial"></script>
  </body>
</html>
